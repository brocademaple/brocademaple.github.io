<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brocade Maple</title>
<style>
  /* HANDOFF NOTE FOR CODEX:
     Fonts below load from Google Fonts CDN. If this needs to work offline or
     reliably in mainland China, replace this @import with local @font-face
     declarations using self-hosted .woff2 files for:
       - Cormorant Garamond: 400, 500, italic 500, italic 600
       - Playfair Display: 600, 700, italic 500, italic 600
       - Inter: 400, 500, 600, 700
       - Noto Serif SC: 400, 500, 600, 700, 900 — this is now the ONLY
         Chinese font on the page (used for body text and headings alike,
         not just display headings). Full CJK charset is large — subset
         to only the characters actually used on the page, or use a
         dynamic-subsetting service, or first paint will be slow.
     Do not swap these fonts for different ones without checking with design —
     the italic-script vs. CJK-serif contrast is the visual signature of the page.
  */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500;1,600&family=Playfair+Display:ital,wght@0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap');

  :root{
    /* ---- 海蓝金 — Mediterranean noon, sun on water ---- */
    --bg-0:#04243f;
    --bg-1:#0a4f7a;
    --mist:#1f8fc4;
    --mist-soft:#0d6694;
    --gold:#e8b54a;
    --gold-bright:#ffe29a;
    --card:#fbf4e2;
    --card-2:#f3e6c8;
    --ink:#13202c;
    --ink-soft:#4c5d6b;
    --particle-a:255,206,107; /* warm gold dust rgb */
    --particle-b:255,255,255; /* sun-glitter white rgb */
    --particle-c:255,225,140; /* bright gold rgb */
    --accent-text:#bfe6ff;
    --sun-glow:#ffe9b0;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:var(--bg-0);
    color:var(--ink);
    font-family:'Inter','Noto Serif SC',serif;
    overflow-x:hidden;
    scroll-behavior:smooth;
  }
  body{
    background:
      radial-gradient(ellipse 60% 50% at 72% 6%, color-mix(in srgb, var(--sun-glow) 70%, transparent), transparent 60%),
      radial-gradient(ellipse 95% 70% at 50% 28%, color-mix(in srgb, var(--mist) 75%, transparent), transparent 78%),
      radial-gradient(ellipse 75% 55% at 15% 88%, color-mix(in srgb, var(--gold) 30%, transparent), transparent 72%),
      linear-gradient(165deg, var(--bg-1), var(--bg-0) 65%, var(--bg-0));
    transition: background 1.2s ease;
    min-height:100vh;
    position:relative;
  }
  /* soft sun wash over the sea-blue field; no hard stripe texture */
  body::before{
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 48% 60% at 69% 9%, color-mix(in srgb, var(--sun-glow) 24%, transparent), transparent 72%),
      linear-gradient(118deg, transparent 0%, color-mix(in srgb, var(--sun-glow) 10%, transparent) 44%, transparent 70%);
    opacity:.58;
    mix-blend-mode:soft-light;
    pointer-events:none;
    z-index:1;
    transition:background 1.2s ease;
  }

  canvas#field{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
  }

  .wrap{
    position:relative;
    z-index:2;
    max-width:1280px;
    margin:0 auto;
    padding:0 64px;
  }

  /* ---------- NAV ---------- */
  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:34px 0 0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:13px;
  }
  .brand-mark{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg, var(--gold-bright), var(--mist));
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;
    font-weight:700;font-size:15px;color:var(--bg-0);
    box-shadow:0 4px 18px color-mix(in srgb, var(--gold) 50%, transparent);
  }
  .brand-name{
    font-size:15px;font-weight:600;letter-spacing:.01em;
    color:#e9eef3;
  }

  .nav-links{
    display:flex;
    align-items:center;
    gap:28px;
  }
  .nav-links a{
    font-family:'Noto Serif SC',serif;
    font-size:13.5px;
    font-weight:500;
    color:rgba(255,255,255,.65);
    text-decoration:none;
    transition:color .25s ease;
  }
  .nav-links a:hover{color:#fff;}
  .nav-links .nav-cta{
    padding:9px 20px;
    border-radius:100px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.16);
    color:#fff;
  }
  .nav-links .nav-cta:hover{background:rgba(255,255,255,.14);}

  /* ---------- HERO ---------- */
  .hero{
    display:grid;
    grid-template-columns:1.05fr .95fr;
    gap:48px;
    align-items:center;
    padding:88px 0 70px;
    min-height:78vh;
  }
  .eyebrow{
    font-size:13px;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent-text);
    margin-bottom:22px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:'';
    width:22px;height:1px;
    background:var(--accent-text);
    opacity:.7;
  }
  h1.title{
    font-family:'Playfair Display',serif;
    font-weight:700;
    font-size:88px;
    line-height:1.0;
    letter-spacing:-.01em;
    color:#f5f3ee;
    margin-bottom:30px;
  }
  h1.title em{
    font-style:italic;
    font-weight:600;
    background:linear-gradient(120deg, var(--gold-bright), var(--gold) 60%, var(--mist));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  /* hero signature words — float directly in the particle field, no card boundary */
  .hero-signature{
    position:relative;
    min-height:420px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:20px 10px;
  }
  .script{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    line-height:1;
    position:relative;
    z-index:1;
    text-decoration:none;
    display:inline-block;
    background:linear-gradient(120deg, var(--gold-bright), var(--gold) 55%, var(--mist));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 18px rgba(0,0,0,.35));
    transition:transform .3s cubic-bezier(.2,.8,.2,1), filter .3s ease;
  }
  .script::after{
    content:'';
    position:absolute;
    left:0; bottom:-4px;
    width:0; height:2px;
    background:var(--gold-bright);
    opacity:.8;
    transition:width .35s ease;
  }
  .script:hover{
    transform:translateY(-2px);
    filter:drop-shadow(0 4px 22px rgba(0,0,0,.45));
  }
  .script:hover::after{ width:100%; }
  /* Modular scale, ratio 1.15, anchored at 44px — each word one step up, reading top-to-bottom like a rising signature */
  .s1{font-size:50px; align-self:flex-start;}
  .s2{font-size:57.5px; align-self:flex-end; margin-top:18px;}
  .s3{font-size:66.1px; align-self:flex-start; margin-top:14px;}

  /* ---------- INDEX SECTION ---------- */
  .index-section{padding:40px 0 130px; scroll-margin-top:90px;}
  .index-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:46px;
    flex-wrap:wrap;
    gap:16px;
  }
  h2.index-title{
    font-family:'Noto Serif SC', 'Playfair Display', serif;
    font-weight:900;
    font-size:46px;
    letter-spacing:.02em;
    color:#fdfaf2;
    text-shadow:0 2px 24px rgba(0,0,0,.25);
  }
  .index-sub{
    font-family:'Noto Serif SC',serif;
    font-size:14.5px;
    color:rgba(232,236,240,.55);
  }
  .catalog-no{
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:.12em;
    color:#9c7a2e;
    margin-bottom:8px;
  }
  .index-status{
    font-family:'Noto Serif SC',serif;
    font-size:12.5px;
    color:rgba(255,255,255,.45);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:22px;
  }
  .proj-card{
    position:relative;
    border-radius:16px;
    background:linear-gradient(155deg, #f8edd2, #ecd9a3);
    padding:22px 22px 50px;
    min-height:172px;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    cursor:pointer;
    overflow:hidden;
    border:1px solid color-mix(in srgb, var(--gold-bright) 55%, transparent);
    box-shadow:
      0 14px 32px -16px rgba(0,0,0,.55),
      0 6px 22px -8px color-mix(in srgb, var(--gold) 45%, transparent),
      inset 0 1px 0 rgba(255,255,255,.5);
    transition:box-shadow .35s ease, border-color .35s ease, transform .35s ease;
    text-decoration:none;
    color:inherit;
    appearance:none;
    font:inherit;
    text-align:left;
    width:100%;
  }
  .proj-card::before{
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(circle at 88% -10%, color-mix(in srgb, var(--gold) 30%, transparent), transparent 60%);
    pointer-events:none;
  }
  .proj-card:hover{
    transform:translateY(-3px);
    border-color:color-mix(in srgb, var(--gold-bright) 85%, transparent);
    box-shadow:
      0 20px 44px -16px rgba(0,0,0,.6),
      0 10px 30px -8px color-mix(in srgb, var(--gold) 60%, transparent),
      inset 0 1px 0 rgba(255,255,255,.55);
  }
  .proj-tag{
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    z-index:1;
    position:relative;
  }
  .proj-script{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:30px;
    line-height:1.12;
    color:var(--ink);
    margin:8px 0 9px;
    z-index:1;
    position:relative;
  }
  .proj-desc{
    font-family:'Noto Serif SC',serif;
    font-size:13px;
    line-height:1.65;
    color:var(--ink-soft);
    z-index:1;
    position:relative;
  }
  .proj-arrow{
    position:absolute;
    bottom:18px; right:18px;
    width:30px;height:30px;
    border-radius:50%;
    background:rgba(15,23,34,.07);
    display:flex;align-items:center;justify-content:center;
    transition:all .3s ease;
    z-index:1;
  }
  .proj-card:hover .proj-arrow{
    background:var(--ink);
    transform:rotate(45deg);
  }
  .proj-arrow svg{stroke:var(--ink); transition:stroke .3s ease;}
  .proj-card:hover .proj-arrow svg{stroke:#f8edd2;}

  /* ---------- PROJECT DETAIL MODAL ---------- */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(4,16,28,.68);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    z-index:100;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .3s ease, visibility .3s ease;
  }
  .modal-backdrop.is-open{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
  }
  .modal-panel{
    position:relative;
    width:100%;
    max-width:560px;
    max-height:85vh;
    overflow-y:auto;
    border-radius:20px;
    background:linear-gradient(165deg, #f8edd2, #ecd9a3);
    border:1px solid color-mix(in srgb, var(--gold-bright) 55%, transparent);
    box-shadow:0 40px 90px -20px rgba(0,0,0,.6), 0 0 60px -10px color-mix(in srgb, var(--gold) 40%, transparent);
    transform:scale(.94) translateY(10px);
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .modal-backdrop.is-open .modal-panel{
    transform:scale(1) translateY(0);
  }
  .modal-close{
    position:absolute;
    top:16px; right:16px;
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(15,23,34,.08);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    z-index:2;
    transition:background .25s ease;
  }
  .modal-close:hover{ background:rgba(15,23,34,.16); }
  .modal-image{
    aspect-ratio:16/8;
    border-radius:20px 20px 0 0;
    background:
      radial-gradient(ellipse 70% 56% at 62% 18%, color-mix(in srgb, var(--gold-bright) 22%, transparent), transparent 70%),
      linear-gradient(150deg, var(--bg-1), var(--mist) 60%, var(--bg-0));
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
  }
  .modal-image span{
    font-family:'Noto Serif SC',serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:.04em;
    color:rgba(255,255,255,.55);
    border:1px dashed rgba(255,255,255,.3);
    border-radius:100px;
    padding:8px 18px;
  }
  .modal-body{ padding:30px 32px 32px; }
  .modal-meta{
    display:flex; align-items:center; gap:12px;
    margin-bottom:10px;
  }
  .modal-catalog{
    font-family:'Inter',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.12em;
    color:#9c7a2e;
  }
  .modal-tag{
    font-family:'Inter',sans-serif;
    font-size:11px; font-weight:600; letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .modal-title{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:42px;
    line-height:1.1;
    color:var(--ink);
    margin-bottom:14px;
  }
  .modal-desc{
    font-family:'Noto Serif SC',serif;
    font-size:14.5px;
    line-height:1.8;
    color:var(--ink-soft);
    margin-bottom:26px;
  }
  .modal-actions{ display:flex; gap:12px; flex-wrap:wrap; }
  .modal-btn{
    font-family:'Noto Serif SC',serif;
    font-size:13.5px;
    font-weight:600;
    padding:11px 22px;
    border-radius:100px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    transition:all .25s ease;
  }
  .modal-btn-primary{
    background:linear-gradient(135deg, var(--mist), var(--mist-soft));
    color:#fff;
    box-shadow:0 6px 18px color-mix(in srgb, var(--mist) 45%, transparent);
  }
  .modal-btn-primary:hover{ transform:translateY(-2px); }
  .modal-btn-disabled{
    background:rgba(15,23,34,.06);
    color:var(--ink-soft);
    cursor:default;
  }
  .modal-btn-secondary{
    background:rgba(15,23,34,.08);
    color:var(--ink);
    border:1px solid rgba(15,23,34,.14);
  }
  .modal-btn-secondary:hover{ background:rgba(15,23,34,.14); }

  @media (max-width:560px){
    .modal-body{ padding:24px 22px 26px; }
    .modal-title{ font-size:34px; }
  }

  footer{
    padding:40px 0 60px;
    text-align:center;
    font-family:'Noto Serif SC',serif;
    font-size:12.5px;
    color:rgba(255,255,255,.3);
  }

  @media (max-width: 900px){
    .wrap{padding:0 24px;}
    .hero{grid-template-columns:1fr; padding-top:50px;}
    h1.title{font-size:52px;}
    .grid{grid-template-columns:1fr;}
    nav{padding-top:24px;}
  }

  @media (prefers-reduced-motion: reduce){
    canvas#field{display:none;}
    *{transition-duration:.01ms !important;}
  }
</style>
</head>
<body>

<canvas id="field"></canvas>

<div class="wrap">

  <nav>
    <div class="brand">
      <div class="brand-mark">BM</div>
      <div class="brand-name">Brocade Maple</div>
    </div>
    <div class="nav-links">
      <a href="#index">作品索引</a>
      <a href="https://github.com/brocademaple" class="nav-cta" target="_blank" rel="noopener">GitHub</a>
    </div>
  </nav>

  <section class="hero">
    <div>
      <div class="eyebrow">Selected works / live prototypes</div>
      <h1 class="title">Brocade<br><em>Maple</em></h1>
    </div>
    <div class="hero-signature">
      <a class="script s1" href="#proj-mcp-training-system" data-open-project="mcp-training-system">Prototype</a>
      <a class="script s2" href="https://github.com/brocademaple" target="_blank" rel="noopener">Archive</a>
      <a class="script s3" href="#proj-siwei-city" data-open-project="siwei-city">Signal</a>
    </div>
  </section>

  <section class="index-section" id="index">
    <div class="index-head">
      <div>
        <h2 class="index-title">作品索引</h2>
        <div class="index-sub" style="margin-top:8px;">每个标题对应一个仓库，点开看代码和说明。</div>
      </div>
      <div class="index-status">截至本稿 · 13 个仓库 · <a href="https://github.com/brocademaple" target="_blank" rel="noopener" style="color:var(--accent-text);">在 GitHub 查看全部 →</a></div>
    </div>

    <div class="grid" id="projectGrid"></div>

  </section>

  <footer>© 2026 Brocade Maple — built one prototype at a time</footer>

</div>

<!-- ===================== Project detail modal ===================== -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-panel" id="modalPanel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="modalClose" type="button" aria-label="关闭">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 2.5l10 10M12.5 2.5l-10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="modal-image" id="modalImage"></div>
    <div class="modal-body">
      <div class="modal-meta">
        <span class="modal-catalog" id="modalCatalog"></span>
        <span class="modal-tag" id="modalTag"></span>
      </div>
      <h3 class="modal-title" id="modalTitle"></h3>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-actions">
        <a class="modal-btn modal-btn-primary" id="modalGithub" href="#" target="_blank" rel="noopener">在 GitHub 查看 →</a>
        <div id="modalDemoSlot"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===================== Project data + card/modal rendering =====================
   Single source of truth for project info — both the grid cards and the
   detail modal read from this array, so card copy and modal copy can never
   drift apart. `demo: null` means no public preview link exists yet; the
   modal shows an honest "待补充" label instead of a fake/disabled link.
   `image` is a placeholder flag for now — swap in a real cover image path
   per project once screenshots exist.
================================================================================ */

    longDesc: '围绕一份岗位 JD，自动生成定制简历、对应的面试准备材料、题库和复盘报告，把求职这件重复性很高的事变成可以批量处理、持续迭代的流程。',
    github: 'https://github.com/brocademaple/one_jd_one_resume',
    demo: null,
    image: null,
  },
  {
    id: 'sparkweave',
    no: '04', status: 'LOCAL ITERATION', tag: 'creative workflow',
    title: 'SparkWeave',
    desc: '正在本地快速迭代的创意 / 内容工作流产品，公开仓库同步后更新完整说明。',
    longDesc: '正在本地快速迭代的创意 / 内容工作流产品。公开仓库已经建好，完整说明和截图会在同步稳定之后补上。',

    demo: null,
    image: null,
  },
  {
    id: 'mcp-training-system',
    no: '05', status: 'PROTOTYPE', tag: 'systems integration',
    title: 'MCP Training\nSystem',
    desc: '面向培训 / 业务流程的 MCP 工具化与系统集成实验。',
    longDesc: '面向培训和业务流程场景，把 MCP 协议用起来做工具化和系统集成的一个早期实验，验证"AI 工具怎么接进已有业务流程"这个问题。',
    github: 'https://github.com/brocademaple/mcp_training-system',
    demo: null,
    image: null,
  },
];

function renderProjectCards(){
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = PROJECTS.map((p, i) => `
    <button class="proj-card" type="button" id="proj-${p.id}" data-index="${i}">
      <div class="catalog-no">No. ${p.no} — ${p.status}</div>
      <div class="proj-tag">${p.tag}</div>
      <div class="proj-script">${p.title.split('\n').join('<br>')}</div>
      <div class="proj-desc">${p.desc}</div>
      <div class="proj-arrow"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 6h6M6.5 3l3 3-3 3" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </button>
  `).join('');
}
renderProjectCards();

/* ---- Modal ---- */
(function(){
  const backdrop   = document.getElementById('modalBackdrop');
  const closeBtn   = document.getElementById('modalClose');
  const elImage    = document.getElementById('modalImage');
  const elCatalog  = document.getElementById('modalCatalog');
  const elTag      = document.getElementById('modalTag');
  const elTitle    = document.getElementById('modalTitle');
  const elDesc     = document.getElementById('modalDesc');
  const elGithub   = document.getElementById('modalGithub');
  const elDemoSlot = document.getElementById('modalDemoSlot');

  let lastFocused = null;

  function openModal(project){
    elCatalog.textContent = `No. ${project.no} — ${project.status}`;
    elTag.textContent = project.tag;
    elTitle.innerHTML = project.title.split('\n').join('<br>');
    elDesc.textContent = project.longDesc || project.desc;
    elGithub.href = project.github;
    elImage.innerHTML = `<span>封面图占位 · ${project.title.replace('\n',' ')}</span>`;

    if(project.demo){
      elDemoSlot.innerHTML = `<a class="modal-btn modal-btn-secondary" href="${project.demo}" target="_blank" rel="noopener">查看预览 →</a>`;
    } else {
      elDemoSlot.innerHTML = `<span class="modal-btn modal-btn-disabled">预览链接待补充</span>`;
    }

    lastFocused = document.activeElement;
    backdrop.classList.add('is-open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal(){
    backdrop.classList.remove('is-open');
    document.body.style.overflow = '';
    if(lastFocused && typeof lastFocused.focus === 'function') lastFocused.focus();
  }

  // Hero signature words (Prototype / Signal) each point at one specific
  // project by id and open its modal directly — not three identical links
  // to the same place. "Archive" is a real external link to the full
  // GitHub profile, so it's left as a plain anchor with no handler here.
  document.querySelectorAll('[data-open-project]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const project = PROJECTS.find(p => p.id === el.dataset.openProject);
      if(project) openModal(project);
    });
  });

  document.getElementById('projectGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.proj-card');
    if(!card) return;
    const idx = parseInt(card.dataset.index, 10);
    if(PROJECTS[idx]) openModal(PROJECTS[idx]);
  });

  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', (e) => {
    if(e.target === backdrop) closeModal();
  });
  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && backdrop.classList.contains('is-open')) closeModal();
  });
})();
</script>

<script>
/* ===================== Particle field =====================
   GOLD-DUST RIBBON — particles cluster along a hooked S-shaped path (a
   multi-waypoint spline, not a single bulge): rises from the lower-left,
   arcs up and over the top, loops down near the right edge, then sweeps
   back left underneath — matching a hand-drawn reference path. Density
   falls off sharply perpendicular to the path. A handful of sparse
   stragglers wander the empty regions. Dominant shape is a faceted diamond
   chip (not thin lines), echoing the angular metal-flake look in the
   reference photo this was modeled on. A one-time converge -> burst ->
   reform plays on load.
=============================================================== */
(function(){
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 1.5);
    W = canvas.width = window.innerWidth * DPR;
    H = canvas.height = window.innerHeight * DPR;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isSmall = window.innerWidth < 800;

  function rand(a,b){ return a + Math.random()*(b-a); }
  function gaussianish(){
    // sum of uniforms approximates a normal distribution, cheap and good enough
    return (Math.random()+Math.random()+Math.random()-1.5)/1.5;
  }

  function colorTuple(){
    const root = getComputedStyle(document.body);
    const a = root.getPropertyValue('--particle-a').trim();
    const b = root.getPropertyValue('--particle-b').trim();
    const c = root.getPropertyValue('--particle-c').trim();
    return [a,b,c];
  }
  let palette = colorTuple();

  // ---- The ribbon path: a large flattened oval loop tilted lower-left to
  // upper-right. Particles flow steadily clockwise around it (verified:
  // screen-angle measured clockwise from 3 o'clock increases monotonically
  // as t increases, since canvas y is flipped relative to math convention).
  // No size pulsing — just smooth, constant circular flow. An ellipse is
  // naturally closed and never crosses itself, so there's no density
  // pile-up anywhere along it; t wraps seamlessly since the curve connects
  // back to itself exactly. ----
  const LOOP_CENTER = {x: 0.55, y: 0.38};
  const LOOP_RADIUS = {x: 0.52, y: 0.30}; // wide, flattened, before rotation
  const LOOP_ROTATION = -32 * Math.PI / 180; // tilts the long axis lower-left -> upper-right
  const LOOP_ROT_COS = Math.cos(LOOP_ROTATION);
  const LOOP_ROT_SIN = Math.sin(LOOP_ROTATION);

  function loopPoint(t){
    const a = t * Math.PI * 2;
    const ex = Math.cos(a) * LOOP_RADIUS.x;
    const ey = Math.sin(a) * LOOP_RADIUS.y;
    const wx = ex * LOOP_ROT_COS - ey * LOOP_ROT_SIN;
    const wy = ex * LOOP_ROT_SIN + ey * LOOP_ROT_COS;
    return {
      x: (LOOP_CENTER.x + wx) * W,
      y: (LOOP_CENTER.y + wy) * H,
    };
  }
  function loopTangent(t){
    const a = t * Math.PI * 2;
    const dex = -Math.sin(a) * LOOP_RADIUS.x;
    const dey =  Math.cos(a) * LOOP_RADIUS.y;
    const dx = dex * LOOP_ROT_COS - dey * LOOP_ROT_SIN;
    const dy = dex * LOOP_ROT_SIN + dey * LOOP_ROT_COS;
    const len = Math.hypot(dx,dy) || 1;
    return {x: dx/len, y: dy/len};
  }

  const RIBBON_COUNT = isSmall ? 460 : 860;
  const STRAY_COUNT  = isSmall ? 44  : 92;

  class Particle{
    constructor(isStray){ this.isStray = !!isStray; this.reset(true); }
    reset(initial){
      if(this.isStray){
        // sparse ambient particles scattered anywhere — matches the faint
        // stragglers visible in the empty regions of the reference image
        this.x = rand(0, W);
        this.y = rand(0, H);
        this.t = null;
      } else {
        this.t = Math.random(); // position around the loop, 0..1, wraps seamlessly
        const pt = loopPoint(this.t);
        const tan = loopTangent(this.t);
        const perp = {x: -tan.y, y: tan.x};
        // Density falls off perpendicular to the curve via a gaussian-ish spread.
        // Wider spread + flatter falloff = a thick cloud-band rather than a thin line.
        const spread = (Math.min(W,H)) * 0.24;
        this.perpOffset = gaussianish() * spread;
        this.x = pt.x + perp.x * this.perpOffset;
        this.y = pt.y + perp.y * this.perpOffset;
        this.perpUnit = perp;
        this.tanUnit = tan;
      }
      const r = Math.random();
      this.type = r < 0.55 ? 'chip' : (r < 0.8 ? 'glint' : 'dust');
      // size: most chips small, a few large bright ones near the curve center for that "scattered gemstone" look
      const closeness = this.isStray ? 0 : Math.max(0, 1 - Math.abs(this.perpOffset)/(Math.min(W,H)*0.24));
      this.depth = this.isStray ? rand(0.2,0.5) : rand(0.4, 0.9) + closeness*rand(0.3,0.9);
      const sizeBase = this.type === 'chip' ? rand(5,14) : this.type === 'glint' ? rand(1.6,3.4) : rand(2,4);
      this.len = sizeBase * DPR * this.depth;
      this.angle = rand(0, Math.PI*2);
      this.spin = rand(-0.01, 0.01);
      this.baseAlpha = this.isStray ? rand(0.12,0.30) : (rand(0.45,1.0) * (0.4 + closeness*0.6));
      this.twinklePhase = rand(0, Math.PI*2);
      this.twinkleSpeed = rand(0.0015, 0.0045);
      this.colorIdx = Math.floor(rand(0,3));
      this.driftSpeed = this.isStray ? rand(0.04,0.12) : rand(0.00095, 0.00132);
      this.scatter = 0; this.scatterVX = 0; this.scatterVY = 0;
      this.strayVX = this.isStray ? rand(-0.12,0.12)*DPR : 0;
      this.strayVY = this.isStray ? rand(-0.18,-0.04)*DPR : 0;
    }
    burst(){
      const cx = W/2, cy = H*0.38;
      const dx = this.x - cx, dy = this.y - cy;
      const dist = Math.max(Math.hypot(dx,dy), 1);
      const force = rand(3.5, 8.5) * DPR;
      this.scatterVX = (dx/dist) * force;
      this.scatterVY = (dy/dist) * force;
      this.scatter = 1;
    }
    update(t, frameScale = 1){
      if(this.scatter > 0){
        this.x += this.scatterVX * frameScale;
        this.y += this.scatterVY * frameScale;
        this.scatterVX *= Math.pow(0.94, frameScale);
        this.scatterVY *= Math.pow(0.94, frameScale);
        this.scatter *= Math.pow(0.96, frameScale);
        if(this.scatter < 0.02) this.scatter = 0;
      } else if(this.isStray){
        this.x += this.strayVX * frameScale;
        this.y += this.strayVY * frameScale;
        if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20) this.reset(false);
      } else {
        // travel slowly clockwise around the loop — wraps with modulo since
        // the ellipse connects back to itself with no seam or jump
        this.t = (this.t + this.driftSpeed * frameScale) % 1;
        const pt = loopPoint(this.t);
        const tan = loopTangent(this.t);
        const perp = {x: -tan.y, y: tan.x};
        // gentle perpendicular wobble so it doesn't look laser-straight
        const wobble = Math.sin(t*0.0006 + this.twinklePhase) * 3 * DPR;
        this.x = pt.x + perp.x * (this.perpOffset + wobble);
        this.y = pt.y + perp.y * (this.perpOffset + wobble);
      }
      this.angle += this.spin * frameScale;
      this.twinkle = 0.6 + 0.4 * Math.sin(t*this.twinkleSpeed + this.twinklePhase);
    }
    draw(ctx, palette){
      const rgb = palette[this.colorIdx];
      const alpha = this.baseAlpha * this.twinkle * (this.scatter > 0 ? Math.max(0.15, 1 - this.scatter*0.3) : 1);
      const useGlow = this.depth > 1.08;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.globalAlpha = Math.min(1, alpha);
      if(this.type === 'chip'){
        // faceted diamond chip — the dominant shape in the reference image
        if(useGlow){ ctx.shadowColor = `rgba(${rgb},0.7)`; ctx.shadowBlur = 5 * DPR; }
        const h = this.len, w = this.len * 0.46;
        const grad = ctx.createLinearGradient(0,-h/2,0,h/2);
        grad.addColorStop(0, `rgba(${rgb},1)`);
        grad.addColorStop(0.5, `rgba(${rgb},0.55)`);
        grad.addColorStop(1, `rgba(${rgb},0.9)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0,-h/2);
        ctx.lineTo(w/2,0);
        ctx.lineTo(0,h/2);
        ctx.lineTo(-w/2,0);
        ctx.closePath();
        ctx.fill();
      } else if(this.type === 'glint'){
        if(useGlow){ ctx.shadowColor = `rgba(${rgb},1)`; ctx.shadowBlur = 9 * DPR * this.depth; }
        ctx.fillStyle = `rgba(${rgb},1)`;
        ctx.beginPath();
        ctx.arc(0,0,this.len/2,0,Math.PI*2);
        ctx.fill();
      } else {
        ctx.fillStyle = `rgba(${rgb},0.9)`;
        ctx.beginPath();
        ctx.arc(0,0,this.len/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const particles = [];
  for(let i=0;i<RIBBON_COUNT;i++) particles.push(new Particle(false));
  for(let i=0;i<STRAY_COUNT;i++) particles.push(new Particle(true));

  function triggerBurst(){
    palette = colorTuple();
    particles.forEach(p => p.burst());
  }
  window.__triggerParticleBurst = triggerBurst;

  let lastFrameTime = performance.now();
  function loop(t){
    const dt = Math.min(40, Math.max(8, t - lastFrameTime || 16.67));
    const frameScale = dt / 16.67;
    lastFrameTime = t;
    ctx.clearRect(0,0,W,H);
    for(const p of particles){
      p.update(t, frameScale);
      p.draw(ctx, palette);
    }
    requestAnimationFrame(loop);
  }
  if(!reduceMotion) requestAnimationFrame(loop);

  setTimeout(()=>{ palette = colorTuple(); }, 50);
})();

/* ===================== Entrance sequence ===================== */
(function(){
  // Particles converge toward center then burst outward on load — the page's opening gesture.
  window.addEventListener('load', () => {
    setTimeout(() => {
      if(window.__triggerParticleBurst) window.__triggerParticleBurst();
    }, 350);
  });
})();

/* ===================== Card entrance (subtle, on load) ===================== */
(function(){
  const cards = document.querySelectorAll('.proj-card');
  cards.forEach((c,i) => {
    c.style.opacity = 0;
    c.style.transform = 'translateY(14px)';
    setTimeout(()=>{
      c.style.transition = 'opacity .6s ease, transform .6s cubic-bezier(.2,.8,.2,1)';
      c.style.opacity = 1;
      c.style.transform = 'translateY(0)';
    }, 120 + i*70);
  });
})();
</script>
