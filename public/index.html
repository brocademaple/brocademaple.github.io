<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brocade Maple | Selected Works</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23082f57'/%3E%3Ccircle cx='43' cy='21' r='12' fill='%23d8ae52'/%3E%3Ctext x='12' y='43' font-size='22' font-family='Arial' font-weight='700' fill='white'%3EBM%3C/text%3E%3C/svg%3E">
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.184.0",
        "animejs": "https://esm.sh/animejs@4.5.0",
        "animejs/adapters/three": "https://esm.sh/animejs@4.5.0/adapters/three"
      }
    }
  </script>
  <style>
    :root {
      --ink: #071326;
      --muted: #58677d;
      --sea: #082f57;
      --sea-soft: #a7cddd;
      --gold: #d8ae52;
      --gold-soft: #f4dc9a;
      --violet: #51318a;
      --green: #2f7c62;
      --surface: rgba(248, 252, 255, 0.74);
      --line: rgba(8, 47, 87, 0.16);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        radial-gradient(circle at 24% 20%, rgba(167, 205, 221, 0.64), transparent 34rem),
        radial-gradient(circle at 78% 12%, rgba(244, 220, 154, 0.34), transparent 30rem),
        linear-gradient(135deg, #f2f9fc 0%, #fbfdff 48%, #edf7f6 100%);
      overflow-x: hidden;
    }

    body[data-palette="violet"] {
      background:
        radial-gradient(circle at 16% 14%, rgba(81, 49, 138, 0.36), transparent 31rem),
        radial-gradient(circle at 82% 16%, rgba(47, 124, 98, 0.34), transparent 30rem),
        radial-gradient(circle at 52% 82%, rgba(244, 220, 154, 0.3), transparent 36rem),
        linear-gradient(135deg, #f8f5ff 0%, #f7fbf6 56%, #fff9ea 100%);
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .mist {
      position: fixed;
      inset: -10% -8% auto;
      height: 78vh;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 38% 46%, rgba(255, 255, 255, 0.88), transparent 30rem),
        radial-gradient(ellipse at 74% 34%, rgba(167, 205, 221, 0.5), transparent 34rem),
        radial-gradient(ellipse at 52% 78%, rgba(255, 255, 255, 0.78), transparent 34rem);
      filter: blur(22px);
      animation: mistDrift 18s ease-in-out infinite alternate;
    }

    @keyframes mistDrift {
      from { transform: translate3d(-2%, -1%, 0) scale(1); }
      to { transform: translate3d(2%, 1%, 0) scale(1.04); }
    }

    @media (prefers-reduced-motion: reduce) {
      .mist { animation: none; }
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 76px;
    }

    header {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 760;
    }

    .mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(145deg, var(--sea), var(--gold));
      box-shadow: 0 18px 44px rgba(8, 47, 87, 0.16);
    }

    .palette {
      display: inline-flex;
      gap: 5px;
      padding: 5px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(16px);
    }

    .palette button {
      border: 0;
      border-radius: 999px;
      padding: 8px 13px;
      color: var(--muted);
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    .palette button[aria-pressed="true"] {
      color: #fff;
      background: var(--sea);
    }

    body[data-palette="violet"] .palette button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--violet), var(--green));
    }

    .hero {
      min-height: calc(100dvh - 112px);
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      gap: 42px;
      align-items: center;
      padding: 36px 0 72px;
    }

    .label {
      margin: 0 0 18px;
      color: #0b6096;
      font-size: 13px;
      font-weight: 780;
    }

    h1 {
      max-width: 680px;
      margin: 0;
      font-size: clamp(44px, 7vw, 88px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero p:not(.label) {
      max-width: 520px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.72;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(7, 19, 38, 0.16);
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 34px rgba(8, 47, 87, 0.12);
      cursor: pointer;
    }

    .button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #082f57, #0c6ca9);
    }

    .stage {
      position: relative;
      min-height: 560px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      background:
        radial-gradient(circle at 48% 42%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.18) 48%, transparent 70%),
        linear-gradient(145deg, rgba(8, 47, 87, 0.12), rgba(216, 174, 82, 0.18));
      box-shadow: 0 42px 96px rgba(8, 47, 87, 0.18);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .stage-word {
      position: absolute;
      z-index: 2;
      color: rgba(7, 19, 38, 0.56);
      font-family: "Snell Roundhand", "Zapfino", "Bodoni 72 Smallcaps", Georgia, serif;
      font-size: clamp(32px, 5vw, 68px);
      line-height: 0.95;
      text-shadow: 0 2px 26px rgba(255, 255, 255, 0.82);
    }

    .stage-word.one { left: 9%; top: 18%; transform: rotate(-10deg); }
    .stage-word.two { right: 9%; top: 28%; transform: rotate(8deg); }
    .stage-word.three { left: 14%; bottom: 16%; transform: rotate(7deg); }

    .projects-head {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .projects-head p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .project {
      position: relative;
      min-height: 270px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      color: var(--ink);
      background:
        radial-gradient(circle at 26% 16%, rgba(216, 174, 82, 0.28), transparent 10rem),
        radial-gradient(circle at 86% 18%, rgba(167, 205, 221, 0.36), transparent 12rem),
        rgba(255, 255, 255, 0.64);
      box-shadow: 0 28px 64px rgba(8, 47, 87, 0.12);
      backdrop-filter: blur(18px);
      text-align: left;
      font: inherit;
      cursor: pointer;
      overflow: hidden;
    }

    body[data-palette="violet"] .project {
      background:
        radial-gradient(circle at 24% 14%, rgba(81, 49, 138, 0.24), transparent 10rem),
        radial-gradient(circle at 86% 18%, rgba(47, 124, 98, 0.24), transparent 11rem),
        radial-gradient(circle at 48% 80%, rgba(216, 174, 82, 0.18), transparent 12rem),
        rgba(255, 255, 255, 0.64);
    }

    .project small {
      color: var(--muted);
      font-size: 14px;
    }

    .script {
      display: block;
      margin-top: 20px;
      color: #122a4d;
      font-family: "Snell Roundhand", "Zapfino", "Bodoni 72 Smallcaps", Georgia, serif;
      font-size: clamp(40px, 5vw, 66px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .project p {
      max-width: 25ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.62;
    }

    dialog {
      border: 0;
      padding: 0;
      background: transparent;
    }

    dialog::backdrop {
      background: rgba(8, 47, 87, 0.26);
      backdrop-filter: blur(16px);
    }

    .panel {
      width: min(760px, calc(100vw - 40px));
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      padding: 30px;
      background: rgba(250, 253, 255, 0.9);
      box-shadow: 0 50px 120px rgba(8, 47, 87, 0.24);
    }

    .panel h3 {
      margin: 0;
      font-family: "Snell Roundhand", "Zapfino", "Bodoni 72 Smallcaps", Georgia, serif;
      font-size: clamp(48px, 8vw, 86px);
      line-height: 1;
      color: #122a4d;
    }

    .panel p {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.78;
    }

    .panel-actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 390px;
      }

      .projects {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body data-palette="sea">
  <canvas id="scene" aria-hidden="true"></canvas>
  <div class="mist"></div>

  <main class="page">
    <header>
      <div class="brand">
        <span class="mark">BM</span>
        <span>Brocade Maple</span>
      </div>
      <div class="palette" aria-label="配色">
        <button type="button" data-set="sea" aria-pressed="true">海蓝金</button>
        <button type="button" data-set="violet" aria-pressed="false">紫金绿</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <p class="label">Selected works / live prototypes</p>
        <h1>Brocade Maple</h1>
        <p>我把想法做成能运行的原型。这里收着 AI 产品、视觉实验和长期打磨的工具。</p>
        <div class="actions">
          <a class="button primary" href="#projects">进入作品</a>
          <a class="button" href="https://github.com/brocademaple">GitHub</a>
        </div>
      </div>

      <div class="stage">
        <span class="stage-word one">Prototype</span>
        <span class="stage-word two">Archive</span>
        <span class="stage-word three">Signal</span>
      </div>
    </section>

    <section id="projects">
      <div class="projects-head">
        <h2>作品索引</h2>
        <p>点开一个标题，看它的目标、演示、源码和交付记录。</p>
      </div>
      <div class="projects">
        <button class="project" data-project="Cyber Lover">
          <small>AI companion prototype</small>
          <span class="script">Cyber Lover</span>
          <p>关于人格稳定、长期记忆和日常触达的陪伴实验。</p>
        </button>
        <button class="project" data-project="Siwei City">
          <small>thinking system</small>
          <span class="script">Siwei City</span>
          <p>把松散问题整理成地图、判断和下一步行动。</p>
        </button>
        <button class="project" data-project="Product Radar">
          <small>product intelligence</small>
          <span class="script">Product Radar</span>
          <p>持续追踪 AI 原生产品线索，沉淀成可检索档案。</p>
        </button>
      </div>
    </section>
  </main>

  <dialog id="projectDialog">
    <div class="panel">
      <h3 id="dialogTitle">Project</h3>
      <p id="dialogBody"></p>
      <div class="panel-actions">
        <a class="button primary" id="dialogLink" href="#">打开详情</a>
        <button class="button" type="button" id="dialogClose">关闭</button>
      </div>
    </div>
  </dialog>

  <script type="module">
    import * as THREE from 'three';
    import { animate, createTimer, createTimeline, stagger, utils } from 'animejs';
    import { getInstances } from 'animejs/adapters/three';
    import 'animejs/adapters/three';

    const body = document.body;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    document.querySelectorAll('[data-set]').forEach((button) => {
      button.addEventListener('click', () => {
        body.dataset.palette = button.dataset.set;
        document.querySelectorAll('[data-set]').forEach((item) => {
          item.setAttribute('aria-pressed', String(item === button));
        });
        const sea = button.dataset.set === 'sea';
        scene.fog.color.set(sea ? '#dff0f7' : '#f3eafa');
        animate(goldMaterial, { color: sea ? '#d8ae52' : '#d7b15a', emissive: sea ? '#4b3200' : '#4f3a05', duration: 700, ease: 'outQuad' });
        animate(blueMaterial, { color: sea ? '#082f57' : '#51318a', duration: 700, ease: 'outQuad' });
      });
    });

    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#dff0f7', 0.055);
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.2, 8);

    scene.add(new THREE.AmbientLight('#ffffff', 1.2));
    const keyLight = new THREE.PointLight('#f4dc9a', 10, 40, 1.6);
    keyLight.position.set(3, 4, 5);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight('#a7cddd', 2.4);
    rimLight.position.set(-3, 2, 3);
    scene.add(rimLight);

    const group = new THREE.Group();
    scene.add(group);

    const goldMaterial = new THREE.MeshStandardMaterial({
      color: '#d8ae52',
      emissive: '#4b3200',
      emissiveIntensity: 0.32,
      metalness: 0.92,
      roughness: 0.18,
      transparent: true,
      opacity: 0.86
    });
    const blueMaterial = new THREE.MeshStandardMaterial({
      color: '#082f57',
      emissive: '#021525',
      emissiveIntensity: 0.12,
      metalness: 0.5,
      roughness: 0.38,
      transparent: true,
      opacity: 0.38
    });

    const columns = 14;
    const rows = 9;
    const depth = 5;
    const total = columns * rows * depth;
    const stormGeo = new THREE.BoxGeometry(0.018, 0.018, 0.18);
    const storm = new THREE.InstancedMesh(stormGeo, goldMaterial, total);
    storm.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    group.add(storm);
    const stormInstances = getInstances(storm);

    const undertowGeo = new THREE.BoxGeometry(0.014, 0.014, 0.12);
    const undertow = new THREE.InstancedMesh(undertowGeo, blueMaterial, Math.floor(total * 0.34));
    undertow.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    group.add(undertow);
    const undertowInstances = getInstances(undertow);

    const fract = (value) => value - Math.floor(value);
    const noise = (index, salt) => fract(Math.sin(index * 127.1 + salt * 311.7) * 43758.5453123);
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));

    function makeStormPoint(index, count, xCount, yCount, zCount) {
      const ix = index % xCount;
      const iy = Math.floor(index / xCount) % yCount;
      const iz = Math.floor(index / (xCount * yCount)) % zCount;
      const tx = ix / Math.max(1, xCount - 1);
      const ty = iy / Math.max(1, yCount - 1);
      const tz = iz / Math.max(1, zCount - 1);
      const angle = index * goldenAngle;
      const clusterRadius = 0.16 + Math.sqrt(index / count) * 1.45;
      const strand = Math.sin(tx * Math.PI * 3.2 + tz * 2.2);
      const offset = noise(index, 3) - 0.5;
      return {
        migrate: {
          x: -5.2 + tx * 10.4 + offset * 0.42,
          y: (ty - 0.5) * 2.7 + strand * 0.58,
          z: (tz - 0.5) * 2.6 + Math.cos(tx * 5.8 + ty * 3.1) * 0.42,
          rotateX: -18 + ty * 36,
          rotateY: 48 + strand * 70,
          rotateZ: angle * 28
        },
        gather: {
          x: 1.15 + Math.cos(angle) * clusterRadius * 1.35,
          y: 0.1 + Math.sin(angle) * clusterRadius * 0.84,
          z: (tz - 0.5) * 1.2 + Math.cos(angle * 0.7) * 0.34,
          rotateX: 24 + Math.sin(angle) * 44,
          rotateY: 180 + Math.cos(angle) * 72,
          rotateZ: angle * 36
        },
        burst: {
          x: (-5.6 + tx * 11.2) + (noise(index, 9) - 0.5) * 1.9,
          y: ((ty - 0.5) * 3.7 + strand * 0.9) + (noise(index, 11) - 0.5) * 1.4,
          z: ((tz - 0.5) * 3.8) + (noise(index, 13) - 0.5) * 1.6,
          rotateX: 140 + noise(index, 15) * 210,
          rotateY: 80 + noise(index, 17) * 280,
          rotateZ: angle * 52
        },
        scale: 0.45 + noise(index, 21) * 1.05
      };
    }

    const stormPoints = Array.from({ length: total }, (_, index) => (
      makeStormPoint(index, total, columns, rows, depth)
    ));
    const undertowPoints = Array.from({ length: undertow.count }, (_, index) => (
      makeStormPoint(index + 97, undertow.count, 9, 7, 4)
    ));

    function pose(points, state, scaleMultiplier = 1) {
      return {
        x: (_, index) => points[index][state].x,
        y: (_, index) => points[index][state].y,
        z: (_, index) => points[index][state].z,
        rotateX: (_, index) => points[index][state].rotateX,
        rotateY: (_, index) => points[index][state].rotateY,
        rotateZ: (_, index) => points[index][state].rotateZ,
        scale: (_, index) => points[index].scale * scaleMultiplier
      };
    }

    utils.set(stormInstances, pose(stormPoints, 'migrate', 1));
    utils.set(undertowInstances, pose(undertowPoints, 'burst', 0.86));

    if (!prefersReducedMotion) {
      animate(group.rotation, {
        y: Math.PI * 2,
        duration: 36000,
        loop: true,
        ease: 'linear'
      });

      createTimeline({
        loop: true,
        defaults: { duration: 2800, ease: 'inOutSine' }
      })
      .add(stormInstances, {
        ...pose(stormPoints, 'gather', 1.32),
        delay: stagger([0, 900], {
          grid: [columns, rows, depth],
          from: 'center',
          jitter: 80,
          seed: 17
        })
      }, 0)
      .add(stormInstances, {
        ...pose(stormPoints, 'burst', 0.74),
        delay: stagger([0, 700], {
          grid: [columns, rows, depth],
          from: [0.62, 0.42, 0.48],
          jitter: 120,
          seed: 29
        }),
        duration: 2200,
        ease: 'outExpo'
      }, '+=180')
      .add(stormInstances, {
        ...pose(stormPoints, 'migrate', 1),
        delay: stagger([0, 1050], {
          grid: [columns, rows, depth],
          axis: 'x',
          jitter: 70,
          seed: 41
        }),
        duration: 3400,
        ease: 'inOutQuad'
      }, '+=120');

      createTimeline({
        loop: true,
        defaults: { duration: 3600, ease: 'inOutQuad' }
      })
      .add(undertowInstances, {
        ...pose(undertowPoints, 'migrate', 0.72),
        delay: stagger([0, 1100], { grid: [9, 7, 4], axis: 'z', jitter: 90, seed: 5 })
      }, 0)
      .add(undertowInstances, {
        ...pose(undertowPoints, 'gather', 0.92),
        delay: stagger([0, 800], { grid: [9, 7, 4], from: 'center', jitter: 100, seed: 9 })
      }, '+=260')
      .add(undertowInstances, {
        ...pose(undertowPoints, 'burst', 0.56),
        delay: stagger([0, 900], { grid: [9, 7, 4], from: 'random', jitter: 120, seed: 12 }),
        duration: 2400,
        ease: 'out(3)'
      }, '+=160');

      animate(keyLight, {
        intensity: [6, 14],
        duration: 3600,
        alternate: true,
        loop: true,
        ease: 'inOutSine'
      });
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    resize();
    window.addEventListener('resize', resize, { passive: true });
    createTimer({ onUpdate: () => renderer.render(scene, camera) });

    const projects = {
      'Cyber Lover': {
        body: '一个关于人格稳定、长期记忆和日常触达的陪伴实验，重点放在关系感能否持续。',
        href: 'https://brocademaple.github.io/bcmp_cyber_lover/'
      },
      'Siwei City': {
        body: '把松散问题整理成地图、判断和下一步行动，用来做选题拆解、方案推演和复盘。',
        href: 'https://brocademaple.github.io/siwei-city/'
      },
      'Product Radar': {
        body: '持续追踪 AI 原生产品线索，沉淀成可检索的数据、档案和发布记录。',
        href: 'https://github.com/brocademaple/ai-daily-product-radar'
      }
    };

    const dialog = document.getElementById('projectDialog');
    const title = document.getElementById('dialogTitle');
    const bodyText = document.getElementById('dialogBody');
    const link = document.getElementById('dialogLink');
    const close = document.getElementById('dialogClose');

    document.querySelectorAll('[data-project]').forEach((button) => {
      button.addEventListener('click', () => {
        const project = projects[button.dataset.project];
        title.textContent = button.dataset.project;
        bodyText.textContent = project.body;
        link.href = project.href;
        dialog.showModal();
      });
    });

    close.addEventListener('click', () => dialog.close());
  </script>
</body>
</html>
